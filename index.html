<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Horikita666</title>
    <style>
      :root {
        --bg: #121212;
        --card: #1e1e1e;
        --text: #e0e0e0;
        --accent: #d4af37;
        --border: #333;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 0;
        padding: 40px 20px;
        line-height: 1.5;
      }
      .container {
        max-width: 480px;
        margin: 0 auto;
      }
      h1 {
        color: var(--accent);
        margin-top: 0;
        font-weight: 700;
      }
      .socials {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }
      @media (min-width: 480px) {
        .socials { grid-template-columns: 1fr 1fr; }
      }
      .btn {
        display: block;
        text-align: center;
        padding: 16px;
        background: var(--card);
        color: var(--text);
        text-decoration: none;
        border-radius: 8px;
        border: 1px solid var(--border);
        transition: all 0.2s ease;
        font-weight: 600;
      }
      .btn:hover {
        transform: translateY(-2px);
        border-color: var(--accent);
        box-shadow: 0 4px 12px rgba(212, 175, 55, 0.15);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Horikita666</h1>

      <section class="socials">
        <a href="https://t.me/Horikita666" class="btn" target="_blank" rel="noopener noreferrer">
          Telegram (личный)
        </a>
        <a href="https://t.me/+pihg7p8YKZ05OGRi" class="btn" target="_blank" rel="noopener noreferrer">
          Чат «Alprazolam funs»
        </a>
      </section>
    </div>
  </body>
</html>
