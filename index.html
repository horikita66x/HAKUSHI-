<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Horikita666</title>
    <style>
      :root {
        --bg-dark: #050510;
        --star-glow: #fff;
        --comet-trail: rgba(200, 230, 255, 0.6);
        --accent-start: #a88aff;
        --accent-end: #ff7ec4;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background-color: var(--bg-dark);
        color: #fff;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
      }

      /* Звёзды */
      .stars {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }
      .star {
        position: absolute;
        background: var(--star-glow);
        border-radius: 50%;
        animation: twinkle infinite alternate;
      }
      @keyframes twinkle {
        0% { opacity: 0.4; transform: scale(0.9); }
        100% { opacity: 1; transform: scale(1.1); }
      }

      /* Падающие звёзды / кометы */
      .shooting-star {
        position: absolute;
        top: -10px;
        width: 4px;
        height: 4px;
        background: #fff;
        border-radius: 50%;
        box-shadow: 0 0 12px rgba(255,255,255,0.6),
                    0 0 20px rgba(160,200,255,0.5);
        animation: shoot linear forwards;
      }
      @keyframes shoot {
        0% {
          opacity: 0;
          transform: translateY(-10px) translateX(0);
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: translateY(calc(100vh + 20px)) translateX(20vw);
        }
      }

      /* Контейнер */
      .container {
        position: relative;
        z-index: 10;
        max-width: 520px;
        margin: 80px auto;
        padding: 0 20px;
        text-align: center;
      }

      h1 {
        font-size: 3rem;
        line-height: 1.1;
        margin-bottom: 24px;
        background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: glow-pulse 4s ease-in-out infinite;
      }

      @keyframes glow-pulse {
        0%, 100% { filter: drop-shadow(0 0 8px rgba(168, 138, 255, 0.6)); }
        50% { filter: drop-shadow(0 0 24px rgba(255, 126, 196, 0.8)); }
      }

      .socials {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }
      @media (min-width: 480px) {
        .socials { grid-template-columns: 1fr 1fr; }
      }

      .btn {
        display: block;
        text-align: center;
        padding: 16px;
        background: rgba(255,255,255,0.06);
        backdrop-filter: blur(4px);
        color: #fff;
        text-decoration: none;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.12);
        font-weight: 600;
        transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        position: relative;
        overflow: hidden;
      }
      .btn::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(
          45deg,
          rgba(168, 138, 255, 0.1),
          transparent,
          rgba(255, 126, 196, 0.1)
        );
        opacity: 0;
        transition: opacity 0.3s;
      }
      .btn:hover {
        transform: translateY(-4px);
        border-color: rgba(255,255,255,0.3);
        box-shadow: 0 12px 32px rgba(0,0,0,0.4),
                    0 0 16px rgba(168, 138, 255, 0.3);
      }
      .btn:hover::before { opacity: 1; }

      /* Генератор звёзд и комет (JS) */
      #js-stars { display: none; }
    </style>
  </head>
  <body>
    <div class="stars" id="js-stars"></div>

    <div class="container">
      <h1>HORIKITA666</h1>

      <section class="socials">
        <a href="https://t.me/Horikita666" class="btn" target="_blank" rel="noopener noreferrer">
          Telegram (личный)
        </a>
        <a href="https://t.me/+pihg7p8YKZ05OGRi" class="btn" target="_blank" rel="noopener noreferrer">
          Чат «Alprazolam funs»
        </a>
      </section>
    </div>

    <script>
      const starsContainer = document.getElementById('js-stars');

      // Создаём звёзды
      function createStars(count) {
        for (let i = 0; i < count; i++) {
          const star = document.createElement('div');
          star.classList.add('star');
          const size = Math.random() * 2 + 1; // 1–3px
          const x = Math.random() * 100;
          const y = Math.random() * 100;
          const duration = Math.random() * 3 + 2; // 2–5s

          star.style.width = `${size}px`;
          star.style.height = `${size}px`;
          star.style.left = `${x}%`;
          star.style.top = `${y}%`;
          star.style.animationDuration = `${duration}s`;

          starsContainer.appendChild(star);
        }
      }

      // Падающие кометы
      function spawnShootingStars() {
        const count = Math.floor(Math.random() * 3) + 1;
        for (let i = 0; i < count; i++) {
          setTimeout(() => {
            const comet = document.createElement('div');
            comet.classList.add('shooting-star');
            comet.style.left = `${Math.random() * 80 + 10}%`;
            comet.style.animationDuration = `${Math.random() * 3 + 2}s`;
            comet.style.animationDelay = `${Math.random() * 2}s`;
            starsContainer.appendChild(comet);

            // Удаляем после анимации
            setTimeout(() => comet.remove(), 5000);
          }, i * 800);
        }
        setTimeout(spawnShootingStars, 4000 + Math.random() * 4000);
      }

      createStars(120);
      spawnShootingStars();
    </script>
  </body>
</html>
